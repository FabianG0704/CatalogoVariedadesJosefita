spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bdjosefita}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:tupassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Cloudinary - las credenciales reales van en las variables de entorno de Render
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:tu_cloud_name}
  api-key: ${CLOUDINARY_API_KEY:tu_api_key}
  api-secret: ${CLOUDINARY_API_SECRET:tu_api_secret}
